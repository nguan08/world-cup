name: Update Football Scores

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:      # Allows manual trigger in GitHub UI

jobs:
  update-scores:
    runs-on: ubuntu-latest

    permissions:
      contents: write     # Grant write permissions to commit changes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Scraper
        run: node update-scores.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Auto-update match scores [skip ci]"
            git push
          else
            echo "No changes in match scores."
          fi
