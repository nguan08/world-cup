# Deploy static site to GitHub Pages (workflow mode — more reliable than legacy branch builds)
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _site
          # Static app only — exclude node_modules, .git, workflows, scrapers
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '_site' \
            --exclude '.kilo' \
            --exclude '.vscode' \
            --exclude 'world cup.worktrees' \
            --exclude '*.worktrees' \
            ./ _site/
          # Keep room/player data used by the app
          ls -la _site | head -50

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
